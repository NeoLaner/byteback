name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { target: x86_64-unknown-linux-musl, os: ubuntu-latest }
          - { target: aarch64-unknown-linux-gnu, os: ubuntu-latest }
          - { target: x86_64-apple-darwin, os: macos-13 }
          - { target: aarch64-apple-darwin, os: macos-latest }
          - { target: x86_64-pc-windows-msvc, os: windows-latest }

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl tools
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Install aarch64 cross linker
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

      - name: Package
        shell: bash
        run: |
          bin=byteback
          [ "${{ runner.os }}" = "Windows" ] && bin=byteback.exe
          tar -czf "byteback-${{ matrix.target }}.tar.gz" -C "target/${{ matrix.target }}/release" "$bin"

      - name: Checksum
        if: runner.os != 'Windows'
        shell: bash
        run: |
          archive="byteback-${{ matrix.target }}.tar.gz"
          (sha256sum "$archive" || shasum -a 256 "$archive") > "$archive.sha256"

      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            byteback-${{ matrix.target }}.tar.gz
            byteback-${{ matrix.target }}.tar.gz.sha256
          generate_release_notes: true

  publish-npm:
    name: publish to npm
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    env:
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Publish platform packages + main package
        # Skips cleanly if the NPM_TOKEN secret is not configured.
        if: ${{ env.NODE_AUTH_TOKEN != '' }}
        working-directory: npm
        env:
          VERSION: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: bash publish.sh
